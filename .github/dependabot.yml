version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    groups:
      eslint:
        patterns: ["eslint*", "@typescript-eslint/*"]
      vitest:
        patterns: ["vitest", "@vitest/*"]
      types:
        patterns: ["@types/*"]
    ignore:
      # Major bumps need human consideration (engines pin, breaking APIs).
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
